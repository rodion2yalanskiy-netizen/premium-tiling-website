name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'assets/**'
      - 'vercel.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            RESPONSE=$(curl -s -X POST "$VERCEL_DEPLOY_HOOK_URL")
            echo "Deploy hook triggered: $RESPONSE"
          else
            echo "::warning::VERCEL_DEPLOY_HOOK_URL secret not configured."
            echo "To enable auto-deploy:"
            echo "  1. Vercel Dashboard → Project → Settings → Git → Deploy Hooks"
            echo "  2. Create hook named 'github-main', branch 'main'"
            echo "  3. GitHub repo → Settings → Secrets → VERCEL_DEPLOY_HOOK_URL = <hook URL>"
            echo ""
            echo "Alternative: connect repo directly in Vercel Dashboard → Git Integration"
            exit 0
          fi
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
